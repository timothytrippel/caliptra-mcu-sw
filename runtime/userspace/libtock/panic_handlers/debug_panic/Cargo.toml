[package]
name = "caliptra-mcu-libtock_debug_panic"
authors = ["Tock Project Developers <tock-dev@googlegroups.com>"]
version = "0.1.0"
description = """Debug panic handler for libtock. Prints panic info to console and terminates."""
edition = "2021"
license = "Apache-2.0 OR MIT"
repository = "https://www.github.com/tock/libtock-rs"

[dependencies]
caliptra-mcu-libtock_console = { path = "../../apis/interface/console" }
caliptra-mcu-libtock_low_level_debug = { path = "../../apis/kernel/low_level_debug" }
caliptra-mcu-libtock_platform = { path = "../../platform" }
caliptra-mcu-libtock_runtime = { path = "../../runtime" }
