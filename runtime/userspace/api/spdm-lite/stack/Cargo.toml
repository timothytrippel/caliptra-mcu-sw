[package]
name = "mcu-spdm-lite-stack"
version.workspace = true
authors.workspace = true
edition.workspace = true


[dependencies]
mcu-spdm-lite-traits = { workspace = true }
mcu-spdm-lite-codec = { workspace = true }
mcu-caliptra-api-lite = { workspace = true }
mcu-spdm-lite-errors = { workspace = true }
mcu-error = { workspace = true }
bitfield-struct = { workspace = true }
zerocopy = { workspace = true }
caliptra-mcu-libtock_console = { workspace = true, optional = true }
caliptra-mcu-libsyscall-caliptra = { workspace = true, optional = true }

[dev-dependencies]
futures.workspace = true

[features]
default = []
set-certificate = []
debug-trace = [
  "caliptra-mcu-libtock_console",
  "caliptra-mcu-libsyscall-caliptra",
]
