| package(tests-integration) and test(test::test_mcu_mbox_soc_requester_loopback )
| package(tests-integration) and test(test::test_mcu_mbox_driver )
| package(tests-integration) and test(test_dot::test::test_fw_manifest_dot_unlock)
| package(tests-integration) and test(test_dot::test::test_fw_manifest_dot_bad_version   )
| package(tests-integration) and test(test_dot::test::test_fw_manifest_dot_lock  )
