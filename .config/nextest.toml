[profile.nightly]
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "5m", terminate-after = 6 }

[profile.nightly.junit]
path = "/tmp/junit.xml"
store-success-output = true
store-failure-output = true

[profile.nightly-emulator]
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "30s", terminate-after = 30 }
# clundin: This test was introduced while the CI was broken. Filtering out until it is fixed.
default-filter = """
!(package(tests-integration) and test(test_soc_boot)
| package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_invalid_manifest)
| package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_invalid_mcu_image)
| package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_invalid_caliptra_image)
