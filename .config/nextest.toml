| package(tests-integration) and test(test_dot)
| package(tests-integration) and test(test_soc_boot)
| package(tests-integration) and test(test_bare_metal::test::test_bare_metal_runtime_boo)
| package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_successful_fast)
