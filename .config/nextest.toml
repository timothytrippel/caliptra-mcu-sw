[profile.nightly]
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "5m", terminate-after = 6 }

[profile.nightly.junit]
path = "/tmp/junit.xml"
store-success-output = false
store-failure-output = true

[profile.nightly-emulator]
store-success-output = false
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "30m", terminate-after = 6 }
# TODO: Failing tests tracked in https://github.com/chipsalliance/caliptra-mcu-sw/issues/1335.
default-filter = """
(all() - 
(package(tests-integration) and test(test_streaming_soc_boot_successful))  - 
(package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_invalid_caliptra_image))  - 
(package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_invalid_manifest))  - 
(package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_invalid_mcu_image))  - 
(package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_invalid_soc_image))  - 
(package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_missing_caliptra_image))  - 
(package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_successful))  - 
(package(tests-integration) and test(test_firmware_update::test::test_firmware_update_flash_successful_fast)))
"""

[profile.nightly-emulator.junit]
path = "/tmp/junit.xml"
store-success-output = false
store-failure-output = true

[profile.nightly-ci]
inherits = "nightly"
# Modify test(test_uds) as we onboard crates to the FPGA test suite.
default-filter = """
(package(mcu-hw-model)
    - test(model_emulated::test::test_new_unbooted)) |
(package(tests-integration) and test(test_axi_bypass)) |
(package(tests-integration) and test(test_jtag_taps)) |
(package(tests-integration) and test(test_lc_transitions)) |
(package(tests-integration) and test(test_manuf_debug_unlock)) |
(package(tests-integration) and test(test_prod_debug_unlock)) |
(package(tests-integration) and test(test_uds)) |
(package(tests-integration) and test(test_imaginary_flash_controller)) |
(package(tests-integration) and test(test_fw_update_e2e)) |
(package(tests-integration) and test(test_mctp_vdm_cmds)) |
(package(tests-integration) and test(test_mcu_mbox_usermode)) |
(package(tests-integration) and test(test_mcu_mbox_cmds)) |
(package(tests-integration) and test(test_mcu_mbox_fips_self_test)) |
(package(tests-integration) and test(test_mcu_mbox_fips_periodic)) |
(package(tests-integration) and test(test_i3c_constant_writes)) |
(package(tests-integration) and test(test_i3c_simple)) |
(package(tests-integration) and test(test_mctp_vdm_cmds))
"""
