[package]
name = "user-app"
version.workspace = true
authors.workspace = true
edition.workspace = true

[dependencies]
async-trait.workspace = true
caliptra-api.workspace = true
constant_time_eq.workspace = true
critical-section.workspace = true
embassy-executor.workspace = true
embassy-sync.workspace = true
caliptra-mcu-common-commands.workspace = true
caliptra-mcu-flash-image.workspace = true
caliptra-mcu-measurement-api.workspace = true
caliptra-mcu-libapi-caliptra.workspace = true
caliptra-mcu-libapi-emulated-caliptra.workspace = true
caliptra-mcu-libsyscall-caliptra.workspace = true
caliptra-mcu-userlog.workspace = true
caliptra-mcu-libtock_console.workspace = true
caliptra-mcu-libtock_low_level_debug.workspace = true
caliptra-mcu-libtock_platform.workspace = true
caliptra-mcu-libtock_runtime.workspace = true
caliptra-mcu-libtock = { workspace = true, features = ["no_panic_handler"] }
caliptra-mcu-libtockasync.workspace = true
caliptra-mcu-config.workspace = true
caliptra-mcu-config-emulator.workspace = true
caliptra-mcu-config-fpga.workspace = true
caliptra-mcu-mbox-lib.workspace = true
caliptra-mcu-mbox-common.workspace = true
caliptra-mcu-mctp-vdm-common.workspace = true
caliptra-mcu-mctp-vdm-lib.workspace = true
portable-atomic.workspace = true
caliptra-mcu-pldm-common.workspace = true
caliptra-mcu-pldm-lib.workspace = true
mcu-error.workspace = true
caliptra-mcu-romtime.workspace = true
mcu-caliptra-api-lite.workspace = true
caliptra-mcu-spdm-codec.workspace = true
caliptra-mcu-spdm-pal.workspace = true
caliptra-mcu-spdm-stack = { workspace = true }
caliptra-mcu-spdm-transports.workspace = true
caliptra-mcu-spdm-traits.workspace = true
caliptra-mcu-spdm-vdm-handler.workspace = true
static_cell.workspace = true
zerocopy.workspace = true

[target.'cfg(not(target_arch = "riscv32"))'.dependencies]
caliptra-mcu-libtock_unittest.workspace = true

[target.'cfg(target_arch = "riscv32")'.dependencies]
embassy-executor = { version = "0.9.1", features = ["arch-riscv32"] }
embedded-alloc.workspace = true
portable-atomic = { workspace = true, features = ["critical-section"] }
defmt = { workspace = true, optional = true }

[build-dependencies]
caliptra-mcu-measurement-api.workspace = true
caliptra-ocp-eat.workspace = true
serde.workspace = true
toml.workspace = true

[features]
default = ["all-features"]
# Caliptra MCU features
all-features = ["spdm", "streaming-boot", "flash-boot", "firmware-update", "doe", "userspace-log"]
spdm = ["mcu-mbox-service"]
streaming-boot = []
flash-boot = []
firmware-update = []
mcu-mbox-service = []
# Test-only mock command HANDLER: device-identity queries (firmware version,
# device ID, UID, capabilities) return hardcoded `config::TEST_*` values for
# integration tests. Off by default — production wires the real
# `CaliptraCmdBackend`, whose unimplemented info queries return
# `UnsupportedOperation`. (The command *authorizer* is separate and stays wired
# in production; only the handler is gated here.)
mcu-mbox-test-handlers = ["mcu-mbox-service"]
# Measurement boot init (off by default). Runs DPE Handle Storage / Software PCR
# Storage cold-boot and hitless-update initialization. Cold boot rotates MCU-RT
# off the default DPE handle, so keep this off until the SPDM evidence path is
# rewired to track the rotated handle.
measurement-boot-init = []
mctp-vdm-service = []
debug = []
hw-2-1 = []
doe = []
userspace-log = [
  "dep:defmt",
  "caliptra-mcu-libapi-caliptra/release",
  "caliptra-mcu-mbox-lib/release",
  "caliptra-mcu-mctp-vdm-lib/release",
  "caliptra-mcu-pldm-lib/release",
  "caliptra-mcu-userlog/defmt-transport",
]
# Production / minimal-size build for user-app.  Activated automatically by
# `xtask runtime-build --profile release` (via `--features release` forwarded
# through the bundler).  Gates `console_writeln!` to a no-op so all of
# user-app's informational and diagnostic output (including the `{:?}` Debug
# format paths) is stripped, and forwards to `caliptra-mcu-romtime/no-print`
# so the romtime `print!`/`println!` macros become no-ops inside user-app's
# private dependency build of `caliptra-mcu-romtime`.
release = [
  "userspace-log",
    "caliptra-mcu-romtime/no-print",
    "caliptra-mcu-libsyscall-caliptra/release",
]
# --- Test features: example-app ---
test-caliptra-certs = []
test-caliptra-crypto = []
test-caliptra-mailbox = []
test-doe-user-loopback = []
test-external-otp = []
test-flash-usermode = []
test-fpga-flash-ctrl = []
test-get-device-state = []
test-log-flash-usermode = []
test-mbox-sram = []
test-mci = []
test-mcu-mbox-usermode = []
test-mcu-svn-gt-fuse = []
test-mcu-svn-lt-fuse = []
test-mctp-user-loopback = []
test-pldm-request-response = []
# --- Test features: kernel-only ---
test-exit-immediately = []
test-i3c-simple = []
test-i3c-constant-writes = []
test-flash-ctrl-init = []
test-flash-ctrl-read-write-page = []
test-flash-ctrl-erase-page = []
test-flash-storage-read-write = []
test-flash-storage-erase = []
test-doe-transport-loopback = []
test-log-flash-circular = []
test-log-flash-linear = []
test-mcu-mbox-driver = []
test-mcu-mbox-soc-requester-loopback = []
test-mcu-rom-flash-access = []
test-mctp-capsule-loopback = []
# --- Test features: user-app ---
test-do-nothing = []
test-defmt-logging-mailbox = ["userspace-log", "mcu-mbox-test-handlers"]
test-defmt-logging-release = ["userspace-log", "mcu-mbox-test-handlers"]
test-defmt-logging-vdm = ["userspace-log", "mcu-mbox-test-handlers", "mctp-vdm-service"]
test-flash-based-boot = ["flash-boot"]
test-firmware-activate = ["firmware-update"]
test-firmware-update-flash = ["flash-boot", "firmware-update"]
test-firmware-update-reject = ["flash-boot", "firmware-update"]
test-firmware-update-streaming = []
test-firmware-v2 = []
test-streaming-boot-flash-write-back = ["streaming-boot", "firmware-update"]
test-mcu-mbox-fips-periodic = ["mcu-mbox-test-handlers", "caliptra-mcu-mbox-lib/periodic-fips-self-test"]
test-mctp-vdm-cmds = ["mctp-vdm-service"]
test-caliptra-util-host-mctp-vdm-validator = ["mctp-vdm-service"]
test-caliptra-util-host-validator = ["mcu-mbox-test-handlers"]
test-mcu-mbox-cmds = ["mcu-mbox-test-handlers"]
test-mcu-mbox-fips-self-test = ["mcu-mbox-test-handlers"]
test-pldm-discovery = []
test-pldm-fw-update = []
test-pldm-fw-update-e2e = []
test-pldm-streaming-boot = ["streaming-boot"]
test-caliptra-util-host-spdm-vdm-validator = ["spdm"]
test-mctp-spdm-attestation = ["spdm"]
test-mctp-spdm-attestation-pcr-quote = ["spdm"]
