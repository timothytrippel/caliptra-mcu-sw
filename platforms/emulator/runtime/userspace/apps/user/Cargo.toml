test-mctp-spdm-set-certificate = [
  "spdm",
  "caliptra-mcu-spdm-pal/set-certificate",
  "caliptra-mcu-spdm-stack/set-certificate",
]
test-doe-spdm-responder-conformance = ["spdm", "doe"]
test-doe-spdm-tdisp-ide-validator = ["spdm", "doe"]
# --- Test features: pass-through (no cfg in source, host-side only) ---
test-doe-discovery = []
test-mctp-ctrl-cmds = []
active-i3c1 = []
