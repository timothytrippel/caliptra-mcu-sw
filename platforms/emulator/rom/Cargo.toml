[package]
name = "mcu-rom-emulator"
version.workspace = true
authors.workspace = true
edition.workspace = true

[build-dependencies]
caliptra-mcu-builder.workspace = true
caliptra-mcu-config-emulator.workspace = true

[dependencies]
bitfield.workspace = true
caliptra-mcu-config.workspace = true
caliptra-mcu-config-emulator.workspace = true
caliptra-mcu-error.workspace = true
caliptra-mcu-image-header.workspace = true
caliptra-mcu-rom-common.workspace = true
caliptra-mcu-registers-generated.workspace = true
caliptra-mcu-romtime.workspace = true
tock-registers.workspace = true
zeroize.workspace = true
zerocopy.workspace = true

[target.'cfg(target_arch = "riscv32")'.dependencies]
riscv-csr.workspace = true
rv32i.workspace = true

[features]
default = []
core_test = ["caliptra-mcu-rom-common/core_test"]
hw-2-1 = ["caliptra-mcu-rom-common/hw-2-1"]
test-dot-recovery = []
test-firmware-update-flash = []
test-firmware-update-streaming = []
test-mcu-rom-flash-access = []
test-mcu-svn-gt-fuse = []
test-mcu-svn-lt-fuse = []
test-flash-based-boot = ["hw-2-1"]
test-fw-manifest-dot = ["caliptra-mcu-rom-common/fw-manifest-dot"]
test-pldm-streaming-boot = []
active-i3c1 = ["caliptra-mcu-config-emulator/active-i3c1"]
test-i3c-services = []
