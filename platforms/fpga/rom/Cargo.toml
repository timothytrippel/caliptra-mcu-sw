[package]
name = "caliptra-mcu-rom-fpga"
version.workspace = true
authors.workspace = true
edition.workspace = true

[build-dependencies]
caliptra-mcu-builder.workspace = true
caliptra-mcu-config-fpga.workspace = true

[dependencies]
caliptra-mcu-config.workspace = true
caliptra-mcu-config-fpga.workspace = true
caliptra-mcu-rom-common.workspace = true
caliptra-mcu-registers-generated.workspace = true
caliptra-mcu-romtime.workspace = true
tock-registers.workspace = true
zeroize.workspace = true

[target.'cfg(target_arch = "riscv32")'.dependencies]
riscv-csr.workspace = true
rv32i.workspace = true

[features]
core_test = ["caliptra-mcu-rom-common/core_test"]
hw-2-1 = ["caliptra-mcu-rom-common/hw-2-1"]
test-i3c-services = ["caliptra-mcu-rom-common/test-i3c-services"]
test-rom-hooks = []
ocp-lock = ["caliptra-mcu-romtime/ocp-lock", "caliptra-mcu-rom-common/ocp-lock"]
stable-owner-key = ["caliptra-mcu-rom-common/stable-owner-key"]
cfi = ["caliptra-mcu-rom-common/cfi"]
