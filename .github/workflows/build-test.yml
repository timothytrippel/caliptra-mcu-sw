name: Build and Test

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  precheckin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_INCREMENTAL: 0
      EXTRA_CARGO_CONFIG: 'target.''cfg(all())''.rustflags = ["-Dwarnings"]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test commit name
        run: |
          echo "Lint: release_ref=$(git rev-parse HEAD)"

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Run precheckin
        run: cargo xtask precheckin

  build-firmware:
    runs-on: [e2-standard-16-big-disk]
    timeout-minutes: 60

    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_VERSION: 0.8.2
      SCCACHE_GHA_CACHE_TO: sccache-caliptra-mcu-sw
      SCCACHE_GHA_CACHE_FROM: sccache-caliptra-mcu-sw
      # Change this to a new random value if you suspect the cache is corrupted
      SCCACHE_C_CUSTOM_CACHE_BUSTER: 62f871a3afb0
      EXTRA_CARGO_CONFIG: 'target.''cfg(all())''.rustflags = ["-Dwarnings"]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Restore sccache binary
        uses: actions/cache/restore@v3
        id: sccache_bin_restore
        with:
          path: ~/.cargo/bin/sccache
          key: sccache-bin-${{ env.SCCACHE_VERSION }}-${{ env.SCCACHE_C_CUSTOM_CACHE_BUSTER }}

      - name: Install sccache
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        run: |
          cargo install sccache --version ${SCCACHE_VERSION} --no-default-features --features=gha --locked

      - name: Save sccache binary
        uses: actions/cache/save@v3
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        with:
          path: ~/.cargo/bin/sccache
          key: ${{ steps.sccache_bin_restore.outputs.cache-primary-key }}

      - name: Configure sccache
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('RUSTC_WRAPPER', process.env.HOME + '/.cargo/bin/sccache');
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build ROM and runtime binaries
        run: |
          # Build with parallel-build feature to enable Rayon and unique target directories
          cargo run -p xtask --features parallel-build -- all-build --platform emulator --separate-runtimes
          sccache --show-stats

      - name: Upload firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bundle
          path: target/all-fw.zip
          retention-days: 1

  build-emulator:
    runs-on: e2-standard-16
    timeout-minutes: 60

    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_VERSION: 0.8.2
      SCCACHE_GHA_CACHE_TO: sccache-caliptra-mcu-sw
      SCCACHE_GHA_CACHE_FROM: sccache-caliptra-mcu-sw
      # Change this to a new random value if you suspect the cache is corrupted
      SCCACHE_C_CUSTOM_CACHE_BUSTER: 62f871a3afb0
      EXTRA_CARGO_CONFIG: 'target.''cfg(all())''.rustflags = ["-Dwarnings"]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Restore sccache binary
        uses: actions/cache/restore@v3
        id: sccache_bin_restore
        with:
          path: ~/.cargo/bin/sccache
          key: sccache-bin-${{ env.SCCACHE_VERSION }}-${{ env.SCCACHE_C_CUSTOM_CACHE_BUSTER }}

      - name: Install sccache
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        run: |
          cargo install sccache --version ${SCCACHE_VERSION} --no-default-features --features=gha --locked

      - name: Save sccache binary
        uses: actions/cache/save@v3
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        with:
          path: ~/.cargo/bin/sccache
          key: ${{ steps.sccache_bin_restore.outputs.cache-primary-key }}

      - name: Configure sccache
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('RUSTC_WRAPPER', process.env.HOME + '/.cargo/bin/sccache');
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build emulator binary
        run: |
          # Build a single emulator that supports all test features via runtime flags
          cargo xtask emulator-build
          sccache --show-stats

      - name: Upload emulator bundle
        uses: actions/upload-artifact@v4
        with:
          name: emulator-bundle
          path: target/emulators.zip
          retention-days: 1

  build-tests:
    runs-on: e2-standard-16
    timeout-minutes: 60

    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_VERSION: 0.8.2
      SCCACHE_GHA_CACHE_TO: sccache-caliptra-mcu-sw
      SCCACHE_GHA_CACHE_FROM: sccache-caliptra-mcu-sw
      # Change this to a new random value if you suspect the cache is corrupted
      SCCACHE_C_CUSTOM_CACHE_BUSTER: 62f871a3afb0
      EXTRA_CARGO_CONFIG: 'target.''cfg(all())''.rustflags = ["-Dwarnings"]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test commit name
        run: |
          echo "Build tests: release_ref=$(git rev-parse HEAD)"

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Install cargo-nextest (prebuilt binary)
        run: |
          curl -LsSf https://get.nexte.st/0.9.118/linux | tar zxf - -C ~/.cargo/bin

      - name: Restore sccache binary
        uses: actions/cache/restore@v3
        id: sccache_bin_restore
        with:
          path: ~/.cargo/bin/sccache
          key: sccache-bin-${{ env.SCCACHE_VERSION }}-${{ env.SCCACHE_C_CUSTOM_CACHE_BUSTER }}

      - name: Install sccache
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        run: |
          cargo install sccache --version ${SCCACHE_VERSION} --no-default-features --features=gha --locked

      - name: Save sccache binary
        uses: actions/cache/save@v3
        if: steps.sccache_bin_restore.outputs.cache-hit != 'true'
        with:
          path: ~/.cargo/bin/sccache
          key: ${{ steps.sccache_bin_restore.outputs.cache-primary-key }}

      - name: Configure sccache
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('RUSTC_WRAPPER', process.env.HOME + '/.cargo/bin/sccache');
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build test archive
        run: |
          cargo --config "$EXTRA_CARGO_CONFIG" xtask test-archive \
            --archive /tmp/nextest-archive.tar.zst
          sccache --show-stats

      - name: Upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: /tmp/nextest-archive.tar.zst
          retention-days: 1

  test_emulator:
    runs-on: ubuntu-latest
    needs: [precheckin, build-firmware, build-emulator, build-tests]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    env:
      CARGO_INCREMENTAL: 0
      EXTRA_CARGO_CONFIG: 'target.''cfg(all())''.rustflags = ["-Dwarnings"]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Install cargo-nextest (prebuilt binary)
        run: |
          curl -LsSf https://get.nexte.st/0.9.118/linux | tar zxf - -C ~/.cargo/bin

      - name: Download firmware bundle
        uses: actions/download-artifact@v4
        with:
          name: firmware-bundle
          path: target/

      - name: Download emulator bundle
        uses: actions/download-artifact@v4
        with:
          name: emulator-bundle
          path: target/

      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive
          path: /tmp/

      # To run these tests locally for debugging, first build the firmware and emulators:
      #   cargo xtask all-build --platform emulator --separate-runtimes
      #   cargo xtask emulator-build
      # Then run the tests with:
      #   cargo xtask test --firmware-bundle target/all-fw.zip --emulator-bundle target/emulators.zip
      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: |
          cargo --config "$EXTRA_CARGO_CONFIG" xtask test \
            --archive /tmp/nextest-archive.tar.zst \
            --shard hash:${{ matrix.shard }}/4 \
            --firmware-bundle "${PWD}/target/all-fw.zip" \
            --emulator-bundle "${PWD}/target/emulators.zip" \
            --workspace-remap .

      - name: Move junit xml
        if: success() || failure()
        run: |
          sudo mv /tmp/junit.xml /tmp/junit-${{ matrix.shard }}.xml

      - name: 'Upload test results'
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: caliptra-test-results-${{ matrix.shard }}
          path: /tmp/junit-${{ matrix.shard }}.xml
          retention-days: 1

  print_test_results:
    runs-on: ubuntu-latest
    needs: [test_emulator]
    if: always()
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 'Download test results'
        uses: actions/download-artifact@v4
        with:
          pattern: caliptra-test-results-*
          merge-multiple: true
          path: /tmp/junit

      - name: Install test-printer
        run: |
          cargo install --git https://github.com/chipsalliance/caliptra-infra test-printer --root /tmp/test-printer

      - name: Print results
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          for xml in /tmp/junit/junit-*.xml; do
            /tmp/test-printer/bin/test-printer --xml-path "$xml" >> $GITHUB_STEP_SUMMARY
          done

  coverage:
    runs-on: ubuntu-latest
    needs: [precheckin, build-firmware, build-emulator, build-tests]

    env:
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install required packages
        run: |
          sudo apt-get update -qy && \
          sudo apt-get install -qy build-essential curl git && \
          rustup toolchain install -c clippy,rust-src,llvm-tools,rustfmt,rustc-dev

      - name: Install cargo-nextest (prebuilt binary)
        run: |
          curl -LsSf https://get.nexte.st/0.9.118/linux | tar zxf - -C ~/.cargo/bin

      - name: Download firmware bundle
        uses: actions/download-artifact@v4
        with:
          name: firmware-bundle
          path: target/

      - name: Download emulator bundle
        uses: actions/download-artifact@v4
        with:
          name: emulator-bundle
          path: target/

      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive
          path: /tmp/

      - name: Build ROM ELF for coverage analysis
        run: cargo xtask rom-build

      - name: Run tests with coverage collection
        run: |
          mkdir -p /tmp/mcu-coverage
          CPTRA_FIRMWARE_BUNDLE="${PWD}/target/all-fw.zip" \
          CPTRA_EMULATOR_BUNDLE="${PWD}/target/emulators.zip" \
          MCU_COVERAGE_PATH=/tmp/mcu-coverage \
          cargo nextest run \
            --archive-file /tmp/nextest-archive.tar.zst \
            --workspace-remap . \
            -E 'not (test(test_firmware_update) | test(test_soc_boot) | test(test_dot::test::test_fw_manifest) | test(test_dot::test::test_dot_fuse) | test(test_new_unbooted))' \
            || true

      - name: Analyze coverage
        run: |
          MCU_COVERAGE_PATH=/tmp/mcu-coverage cargo xtask coverage --analyze-only 2>&1 | tee /tmp/coverage-results.txt
          echo '## Code Coverage' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Image | Metric | Value |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|--------|-------|' >> $GITHUB_STEP_SUMMARY
          grep -E "^(MCU ROM Coverage|ICCM/SRAM Coverage|Instruction count|Coverage =|Bits set)" /tmp/coverage-results.txt | \
          awk '
            /MCU ROM Coverage/ { image="MCU ROM" }
            /ICCM\/SRAM Coverage/ { match($0, /tag=[0-9]+/); image="ICCM/SRAM " substr($0, RSTART, RLENGTH) }
            /Instruction count/ { print "| " image " | Instructions | " $NF " |" }
            /Coverage =/ { print "| " image " | Coverage | " $NF " |" }
            /Bits set =/ { for(i=1;i<=NF;i++){if($i=="=")a=$((i+1)); if($i=="/")b=$((i+1)); if($i~/\(/){p=$i}} print "| " image " | Bits set | " a " / " b " " p " |" }
          ' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '_Full details in build log. Uncovered function list omitted from summary._' >> $GITHUB_STEP_SUMMARY

