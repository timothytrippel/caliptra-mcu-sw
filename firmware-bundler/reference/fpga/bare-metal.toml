[platform]
name = "fpga-bare-metal"
tuple = "riscv32imc-unknown-none-elf"
dynamic_sizing = true
page_size = 256

[platform.rom]
offset = 0xb004_0000
size = 0x2_0000 # 128KB

[platform.runtime_memory]
sram = { offset = 0xa8c0_0000, size = 0x8_0000 } # 512KB

[platform.dccm]
offset = 0x5000_0000
size = 0x4000 # 16KB

[bare_metal]
name = "{{BARE_METAL_NAME}}"
stack = 0x4000
exception_stack = 0x400
