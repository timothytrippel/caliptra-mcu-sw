[platform]
name = "emulator-bare-metal"
tuple = "riscv32imc-unknown-none-elf"
dynamic_sizing = true
page_size = 256

[platform.rom]
offset = 0x8000_0000
size = 0x2_0000

[platform.runtime_memory]
sram = { offset = 0x4000_0000, size = 0x8_0000 }

[platform.dccm]
offset = 0x5000_0000
size = 0x4000

[platform.flash]
offset = 0x3BFE_0000
size = 0x2_0000

[bare_metal]
name = "caliptra-mcu-bare-metal"
stack = 0x4000
exception_stack = 0x400
