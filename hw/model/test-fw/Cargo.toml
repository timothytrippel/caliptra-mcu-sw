[package]
name = "caliptra-mcu-hw-model-test-fw"
version.workspace = true
edition.workspace = true

[features]
default = []
riscv = []
emu = []
fpga_realtime = ["caliptra-mcu-test-harness/fpga_realtime"]

[build-dependencies]
caliptra-mcu-builder.workspace = true
caliptra-mcu-config-emulator.workspace = true
caliptra-mcu-config-fpga.workspace = true

[dependencies]
caliptra-api.workspace = true
caliptra-registers.workspace = true
caliptra-mcu-config.workspace = true
caliptra-mcu-config-emulator.workspace = true
caliptra-mcu-config-fpga.workspace = true
caliptra-mcu-error.workspace = true
caliptra-mcu-rom-common.workspace = true
caliptra-mcu-usb-emulator.workspace = true
caliptra-mcu-test-harness.workspace = true
caliptra-mcu-ocp.workspace = true
caliptra-mcu-registers-generated.workspace = true
zerocopy.workspace = true
caliptra-mcu-romtime.workspace = true
tock-registers.workspace = true

[target.'cfg(target_arch = "riscv32")'.dependencies]
riscv-csr.workspace = true
rv32i.workspace = true

[[bin]]
name = "hitless_update_flow"
path = "hitless_update_flow.rs"
required-features = ["riscv"]

[[bin]]
name = "mailbox_responder"
path = "mailbox_responder.rs"
required-features = ["riscv"]

[[bin]]
name = "exception_handler"
path = "exception_handler.rs"
required-features = ["riscv"]

[[bin]]
name = "sw_digest_lock"
path = "sw_digest_lock.rs"
required-features = ["riscv"]
