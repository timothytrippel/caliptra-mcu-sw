# MCTP VDM Test Configuration

[device]
device_id = 0x0010
vendor_id = 0x1414
subsystem_vendor_id = 0x0001
subsystem_id = 0x0002

[network]
default_server_address = "127.0.0.1:63333"
target_i3c_address = 0x08

[validation]
timeout_seconds = 30
retry_count = 3
verbose_output = false

[server]
bind_address = "127.0.0.1:63333"
max_connections = 10

[device_capabilities]
capabilities = 0x000001F3
max_cert_size = 4096
max_csr_size = 2048
device_lifecycle = 1
fips_status = 0x00000001

[firmware_version]
rom_version = "1.0.0"
runtime_version = "1.0.0"
fips_status = 0x00000001
rom_firmware_id = 0
runtime_firmware_id = 1

[device_info]
info_index = 0
expected_info = "Caliptra VDM Test Device v1.0"
min_info_length = 16
max_info_length = 64
fips_status = 0
