# SPDM Client Test Configuration

[network]
# Server address for the SPDM-over-MCTP bridge (emulator I3C controller socket)
server_address = "127.0.0.1:63333"

[spdm]
# Certificate slot ID (0-7)
slot_id = 0

[validation]
timeout_seconds = 30
verbose_output = false

[export_attested_csr]
# 1 = LDevID, 2 = FMC Alias, 3 = RT Alias
key_ids = [1, 2, 3]
# ECC384 = 1, MlDsa87 = 2
algorithm = 1

[fe_prog]
partition = 0
# Hex-encoded ECC private key (P-384) and ML-DSA seed (32 bytes) for FE_PROG authorization.
# Must match keys in the MCU firmware.
ecc_auth_key = "3da9e680aff5a1cea96a3e89810286fb3b3030a9c924ad2f2031a07d294052a97cafa1fc6ea760a43db763ca9f2f7036"
mldsa_auth_key = "63616c69707472612d6d63752d74657374696e672d6d6c6473612d736565642d"
