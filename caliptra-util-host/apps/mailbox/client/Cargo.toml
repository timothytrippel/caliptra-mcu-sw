[package]
name = "caliptra-mailbox-client"
version.workspace = true
edition.workspace = true
description = "Caliptra Mailbox Client Library with Validation Support"

# Library
[lib]
name = "caliptra_mailbox_client"
path = "src/lib.rs"

# Binary
[[bin]]
name = "validator"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
clap.workspace = true
caliptra-mcu-core-util-host-mailbox-test-config.workspace = true
caliptra-util-host-session.workspace = true
caliptra-mcu-core-util-host-transport.workspace = true
caliptra-util-host-commands.workspace = true
caliptra-mcu-core-util-host-command-types.workspace = true
caliptra-mcu-debug-unlock-signer.workspace = true
ecdsa.workspace = true
fips204.workspace = true
hmac.workspace = true
p384 = { workspace = true, features = ["ecdsa"] }
sha2.workspace = true
zerocopy.workspace = true